name: pixel_revive
description: "PixelRevive - AI Photo Restore & Enhance. Version 1 with on-device image processing."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & state
  cupertino_icons: ^1.0.8
  provider: ^6.1.2

  # Image pick / capture
  image_picker: ^1.1.2

  # On-device image processing (real filters, not demo)
  image: ^4.2.0

  # Storage / sharing
  path_provider: ^2.1.3
  path: ^1.9.0
  share_plus: ^9.0.0
  gal: ^2.3.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  http: ^1.2.1
  url_launcher: ^6.3.0

  # Splash & icons
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#090A0F"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter_native_splash:
  color: "#090A0F"
  image: "assets/images/splash.png"
  android: true
  ios: false
  android_12:
    image: "assets/images/splash.png"
    color: "#090A0F"