workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'master'
          include: true
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Generate Android launcher icons
        script: |
          flutter pub run flutter_launcher_icons:main
      - name: Build Android APK
        script: |
          flutter build apk --release

          echo "=========================================="
          echo "BUILD COMPLETED!"
          echo "=========================================="

          ls -la build/app/outputs/flutter-apk/

          echo "APK Size: $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)"
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - saaddkhan99@gmail.com
        notify:
          success: true
          failure: true
