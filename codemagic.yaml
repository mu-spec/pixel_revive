workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Generate Android launcher icons
        script: |
          flutter pub run flutter_launcher_icons:main
      - name: Build Android APK
        script: |
          flutter build apk --release
          
          echo "=========================================="
          echo "BUILD COMPLETED!"
          echo "=========================================="
          
          echo "Listing APK files:"
          find build -name "*.apk" -type f 2>/dev/null || ls -la build/app/outputs/flutter-apk/
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - m94769568@gmail.com
        notify:
          success: true
          failure: true