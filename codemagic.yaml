workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Generate Android launcher icons
        script: |
          flutter pub run flutter_launcher_icons:main
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release-unsigned.apk
    publishing:
      email:
        recipients:
          - ju8877521@gmail.com
        notify:
          success: true
          failure: true