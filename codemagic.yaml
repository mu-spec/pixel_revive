workflows:
  android-workflow:
    name: PixelRevive Android Release APK Build
    max_build_duration: 45
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Build Android Release APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt