workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: 3.32.0
      java: 17

    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Generate app icon and native splash screen
        script: |
          echo "Generating launcher icon..."
          dart run flutter_launcher_icons || true

          echo "Generating native splash screen..."
          dart run flutter_native_splash:create || true

      - name: Build Android Release APK
        script: |
          echo "Building RELEASE split APKs (much faster than debug on phone)..."

          # Release is much faster/smaller than debug. Split per ABI creates
          # smaller APKs. Most modern Android phones use arm64-v8a.
          flutter build apk --release --split-per-abi || true

          echo "===== Searching for APK files ====="
          find . -name "*.apk" -type f 2>/dev/null
          echo "==================================="

          mkdir -p artifacts_out

          APK_COUNT=$(find . -name "*.apk" -type f 2>/dev/null | wc -l | tr -d ' ')

          if [ "$APK_COUNT" = "0" ]; then
            echo "No APK found after flutter build. Trying Gradle directly..."
            chmod +x android/gradlew
            cd android
            ./gradlew :app:assembleRelease
            cd ..
          fi

          APK_COUNT=$(find . -name "*.apk" -type f 2>/dev/null | wc -l | tr -d ' ')

          if [ "$APK_COUNT" = "0" ]; then
            echo "ERROR: No APK file was produced."
            exit 1
          fi

          echo "Copying APK files to artifacts_out..."
          find . -name "*.apk" -type f -exec cp {} artifacts_out/ \;

          echo "===== APK files ready for download ====="
          ls -lh artifacts_out
          echo "========================================"

      - name: Generate APK size analysis report
        script: |
          echo "Generating Flutter APK size analysis for android-arm64..."
          mkdir -p size_reports

          # This build creates Flutter size analysis JSON files.
          # It may print a detailed size summary in the Codemagic log.
          flutter build apk --release --target-platform android-arm64 --analyze-size || true

          echo "===== Searching for Flutter size analysis files ====="
          find build -path "*flutter_size*" -type f 2>/dev/null || true
          find build -name "*.json" -type f 2>/dev/null | grep -E "flutter_size|snapshot|analysis" || true
          echo "===================================================="

          echo "Copying size analysis files to size_reports..."
          find build -path "*flutter_size*" -type f -exec cp {} size_reports/ \; 2>/dev/null || true
          find build -name "*.json" -type f 2>/dev/null | grep -E "flutter_size|snapshot|analysis" | while read file; do cp "$file" size_reports/ || true; done

          echo "===== Project asset size summary =====" | tee size_reports/asset_size_summary.txt
          du -h -d 2 assets 2>/dev/null | sort -h | tee -a size_reports/asset_size_summary.txt
          echo "" | tee -a size_reports/asset_size_summary.txt
          echo "===== Largest asset files =====" | tee -a size_reports/asset_size_summary.txt
          find assets -type f -printf '%s %p\n' 2>/dev/null | sort -nr | head -40 | tee -a size_reports/asset_size_summary.txt
          echo "" | tee -a size_reports/asset_size_summary.txt
          echo "===== APK artifact sizes =====" | tee -a size_reports/asset_size_summary.txt
          find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null | tee -a size_reports/asset_size_summary.txt

          echo "Creating easy-download size report artifacts..."
          mkdir -p artifacts_out
          cp size_reports/asset_size_summary.txt artifacts_out/asset_size_summary.txt 2>/dev/null || true
          zip -r artifacts_out/size_reports.zip size_reports >/dev/null 2>&1 || true

          echo "===== Size reports ready for download ====="
          ls -lh size_reports || true
          echo "===== artifacts_out now contains APKs and reports ====="
          ls -lh artifacts_out || true
          echo "==========================================="

    artifacts:
      - artifacts_out/*.apk
      - artifacts_out/*.txt
      - artifacts_out/*.zip
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/**/*.apk
      - size_reports/*
      - build/**/flutter_size_*/*

    publishing:
      email:
        recipients:
          - ju8877521@gmail.com
        notify:
          success: true
          failure: true
