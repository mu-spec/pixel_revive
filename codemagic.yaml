workflows:
  android-workflow:
    name: PixelRevive Android Release APK Build
    max_build_duration: 45
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Generate Android launcher icons
        script: |
          flutter pub run flutter_launcher_icons:main
      - name: Build Android Release APK - Universal Single APK
        script: |
          set -e
          # Build ONE universal fat APK - no ABI splits
          flutter build apk --release --no-split-per-abi --target-platform android-arm,android-arm64,android-x64
          
          echo "Searching for generated APK files..."
          find build -name "*.apk" -type f -print || true

          # The universal APK
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          
          if [ ! -f "$APK_PATH" ]; then
            echo "Universal APK not found at $APK_PATH, searching..."
            APK_PATH=$(find build/app/outputs/flutter-apk -name "app-release.apk" -type f | head -n 1)
          fi

          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "ERROR: No app-release.apk was generated."
            exit 1
          fi

          echo "Found APK: $APK_PATH"
          echo "APK size: $(du -h "$APK_PATH" | cut -f1)"
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
