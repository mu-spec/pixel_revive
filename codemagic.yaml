workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: 3.32.0
      java: 17

    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Generate app icon and native splash screen
        script: |
          echo "Generating launcher icon..."
          dart run flutter_launcher_icons || true

          echo "Generating native splash screen..."
          dart run flutter_native_splash:create || true

      - name: Build Android Debug APK
        script: |
          flutter build apk --debug

      - name: Collect APK artifact
        script: |
          echo "===== Searching for APK ====="
          find build -name "*.apk" -type f
          echo "============================="

          mkdir -p artifacts_out

          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            cp build/app/outputs/flutter-apk/app-debug.apk artifacts_out/app-debug.apk
            echo "APK copied to artifacts_out/app-debug.apk"
          else
            echo "ERROR: app-debug.apk not found!"
            exit 1
          fi

    artifacts:
      - artifacts_out/app-debug.apk
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - ju8877521@gmail.com
        notify:
          success: true
          failure: true