workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew clean
          cd ..
          flutter build apk --debug
          cp build/app/outputs/flutter-apk/app-debug.apk ./pixel_revive_debug.apk
    artifacts:
      - pixel_revive_debug.apk
    publishing:
      email:
        recipients:
          - ju8877521@gmail.com
        notify:
          success: true
          failure: true