workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: 3.32.0
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - ju8877521@gmail.com
        notify:
          success: true
          failure: true
