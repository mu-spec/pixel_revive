workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: 3.32.0
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Generate app icon and native splash screen
        script: |
          # Regenerate the launcher icon from assets/images/icon.png
          dart run flutter_launcher_icons || true
          # Regenerate the native (pre-Flutter) splash screen
          dart run flutter_native_splash:create || true
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug || true
          echo "===== Searching for any APK produced ====="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=========================================="
          # Copy whatever APK was built into a known location so the artifact is always captured
          mkdir -p artifacts_out
          find . -name "*.apk" -type f -exec cp {} artifacts_out/ \;
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/**/*.apk
      - artifacts_out/*.apk
    publishing:
      email:
        recipients:
          - ju8877521@gmail.com
        notify:
          success: true
          failure: true
