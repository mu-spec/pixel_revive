workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: 3.32.0
      java: 17

    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Generate app icon and native splash screen
        script: |
          echo "Generating launcher icon..."
          dart run flutter_launcher_icons || true

          echo "Generating native splash screen..."
          dart run flutter_native_splash:create || true

      - name: Build Android Debug APK
        script: |
          echo "Building debug APK..."

          # Flutter sometimes builds the APK but fails to find it.
          # So we allow this command to continue, then we search for the APK manually.
          flutter build apk --debug || true

          echo "===== Searching for APK files ====="
          find . -name "*.apk" -type f 2>/dev/null
          echo "==================================="

          mkdir -p artifacts_out

          APK_COUNT=$(find . -name "*.apk" -type f 2>/dev/null | wc -l | tr -d ' ')

          if [ "$APK_COUNT" = "0" ]; then
            echo "No APK found after flutter build. Trying Gradle directly..."

            chmod +x android/gradlew
            cd android
            ./gradlew :app:assembleDebug
            cd ..

            echo "===== Searching again for APK files ====="
            find . -name "*.apk" -type f 2>/dev/null
            echo "========================================="
          fi

          APK_COUNT=$(find . -name "*.apk" -type f 2>/dev/null | wc -l | tr -d ' ')

          if [ "$APK_COUNT" = "0" ]; then
            echo "ERROR: No APK file was produced."
            exit 1
          fi

          echo "Copying APK files to artifacts_out..."
          find . -name "*.apk" -type f -exec cp {} artifacts_out/ \;

          echo "===== APK files ready for download ====="
          ls -la artifacts_out
          echo "========================================"

    artifacts:
      - artifacts_out/*.apk
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - ju8877521@gmail.com
        notify:
          success: true
          failure: true