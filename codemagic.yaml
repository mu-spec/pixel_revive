workflows:
  android-workflow:
    name: PixelRevive Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Generate Android launcher icons
        script: |
          flutter pub run flutter_launcher_icons:main
      - name: Build Android APK
        script: |
          flutter build apk --release 2>&1
          
          echo "=========================================="
          echo "Checking for APK files..."
          echo "=========================================="
          
          find . -name "*.apk" -type f 2>/dev/null
          
          echo "=========================================="
          echo "Checking build directory..."
          echo "=========================================="
          
          ls -la build/ 2>/dev/null || echo "No build directory"
          ls -la build/app/ 2>/dev/null || echo "No build/app directory"
          ls -la build/app/outputs/ 2>/dev/null || echo "No build/app/outputs directory"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No flutter-apk directory"
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/**/*.apk
    publishing:
      email:
        recipients:
          - m94769568@gmail.com
        notify:
          success: true
          failure: true